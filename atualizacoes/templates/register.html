<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="icon" href="../static/img/logo.png" type="image/x-icon">
    <style>
        body {
            background: url("../static/img/spfc.atual.webp") no-repeat center center fixed;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* camada de escurecimento */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            /* quanto maior o último valor, mais escuro */
            z-index: 0;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.7);
            border: none;
            border-radius: 20px;
            color: rgb(0, 0, 0);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            width: 380px;
        }

        h3 {
            font-weight: bold;
        }

        label {
            font-weight: bold;
            color: rgb(0, 0, 0);
        }

        .form-control {
            background-color: rgba(255, 0, 0, 0.7);
            border: none;
            border-radius: 20px;
            color: rgb(0, 0, 0);
            font-weight: 600;
        }

        .form-control::placeholder {
            color: #f5f5f5;
        }

        .btn-primary {
            background-color: rgba(255, 0, 0, 0.4);
            border: none;
            border-radius: 20px;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #ff0000;
            transition: 0.9s;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card p-4 text-center">
        <h3 class="mb-3">Criar Conta</h3>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuário</label>
                <input id="username" class="form-control" type="text" name="username" required>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Senha</label>
                <input id="password" class="form-control" type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        </form>

        <p class="mt-3">
            Já tem conta? <a href="{{ url_for('login_page') }}">Faça login</a>
        </p>
    </div>
</body>

</html>
